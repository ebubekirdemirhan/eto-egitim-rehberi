<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Senkronoskop kadran1">
  <defs>
    <linearGradient id="dialBg" cx="0%" cy="0%" r="1"><stop offset="0%" style="stop-color:#1e293b"/><stop offset="100%" style="stop-color:#0f172a"/></linearGradient>
  </defs>
  <circle cx="100" cy="100" r="88" fill="url(#dialBg)" stroke="#475569" stroke-width="2"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#334155" stroke-width="1"/>
  <!-- Scale labels -->
  <text x="100" y="32" fill="#4ade80" font-size="11" font-weight="700" text-anchor="middle">SYNCHRONIZED</text>
  <text x="32" y="108" fill="#facc15" font-size="12" text-anchor="middle">FAST</text>
  <text x="168" y="108" fill="#facc15" font-size="12" text-anchor="middle">SLOW</text>
  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="100" y1="28" x2="100" y2="38" stroke="#64748b" stroke-width="2"/>
  <line x1="162" y1="100" x2="172" y2="100" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="162" x2="100" y2="172" stroke="#64748b" stroke-width="2"/>
  <line x1="28" y1="100" x2="38" y2="100" stroke="#64748b" stroke-width="2"/>
  <!-- Needle (at 12 = synced) -->
  <line x1="100" y1="100" x2="100" y2="42" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="6" fill="#38bdf8"/>
  <!-- Inner label -->
  <text x="100" y="128" fill="#94a3b8" font-size="9" text-anchor="middle">SYNCHRO CHECK</text>
  <text x="100" y="142" fill="#64748b" font-size="8" text-anchor="middle">RELAY</text>
  <text x="100" y="158" fill="#64748b" font-size="8" text-anchor="middle">GEN · BUS</text>
